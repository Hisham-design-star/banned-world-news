name: Global News Radar Engine

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-radars:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. سحب المشروع
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. إعداد بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. تشغيل محركات الرصد
        run: |
          python scripts/palestine_center.py
          python scripts/military_ops.py
          python scripts/banned_news.py
        continue-on-error: true

      - name: 4. المزامنة القسرية والرفع (Force Push Strategy)
        run: |
          git config --local user.email "radar-bot@bannednews.com"
          git config --local user.name "Radar-Engine-Bot"
          
          # إضافة التغييرات
          git add .
          
          # التحقق من وجود بيانات جديدة
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "تحديث رادار الحقيقة: أرشفة بيانات جديدة"
            
            # جلب آخر التحديثات وتطبيق التعديلات فوقها برفق
            git pull --rebase origin main
            
            # في حال فشل الـ rebase بسبب تعارض ملفات JSON، سنفرض نسخة الرادار
            if [ $? -ne 0 ]; then
              git rebase --abort
              git push origin main --force
            else
              git push origin main
            fi
          else
            echo "لا توجد بيانات جديدة."
          fi

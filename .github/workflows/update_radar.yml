name: Global News Radar Engine

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

# 1. إضافة مهمة جداً لمنح البوت صلاحية حفظ ورفع الملفات إلى المستودع
permissions:
  contents: write

jobs:
  run-radars:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. سحب ملفات المشروع
        uses: actions/checkout@v4
        with:
          ref: main # 2. إجبار الأكشن على استخدام فرع main لتجنب مشكلة الانفصال (Detached HEAD)
          fetch-depth: 0

      - name: 2. تجهيز بيئة بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Palestine Center Radar
        run: python scripts/palestine_center.py
        continue-on-error: true

      - name: Run Military Ops Radar
        run: python scripts/military_ops.py
        continue-on-error: true

      - name: Run Banned News Radar
        run: python scripts/banned_news.py
        continue-on-error: true

      - name: Commit and Push New Data
        run: |
          git config --local user.email "radar-bot@bannednews.com"
          git config --local user.name "Radar Bot"
          
          git add .
          
          if ! git diff --staged --quiet; then
            git commit -m "تحديث تلقائي: رصد بيانات أخبار جديدة"
            git pull --rebase origin main
            git push origin main # 3. تحديد الفرع صراحة أثناء الرفع لضمان نجاح العملية
          else
            echo "لا توجد بيانات أو أخبار جديدة لرفعها في هذا التشغيل."
          fi

name: Global News Radar Engine

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

# منح الصلاحيات اللازمة للأكشن للقيام بعملية الرفع (Push)
permissions:
  contents: write

jobs:
  run-radars:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. سحب ملفات المشروع
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. تجهيز بيئة بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Palestine Center Radar
        run: python scripts/palestine_center.py
        continue-on-error: true

      - name: Run Military Ops Radar
        run: python scripts/military_ops.py
        continue-on-error: true

      - name: Run Banned News Radar
        run: python scripts/banned_news.py
        continue-on-error: true

      - name: Commit and Push New Data
        run: |
          git config --local user.email "radar-bot@bannednews.com"
          git config --local user.name "Radar Bot"
          
          # إضافة كافة الملفات الجديدة والمعدلة
          git add .
          
          # التحقق مما إذا كان هناك شيء جديد فعلياً للحفظ
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "تحديث تلقائي: رصد بيانات أخبار جديدة"
            # السحب مع دمج التغييرات بشكل آمن وتفضيل الملفات الجديدة في حال التعارض
            git pull --rebase -X theirs origin main
            git push origin main
          else
            echo "لا توجد بيانات جديدة تم رصدها في هذا التشغيل."
          fi

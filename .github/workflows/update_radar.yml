name: Global News Radar - Total Sync

on:
  schedule:
    - cron: '0 */3 * * *' # كل 3 ساعات
  workflow_dispatch:

permissions:
  contents: write

jobs:
  radar-job:
    runs-on: ubuntu-latest
    steps:
      - name: 1. سحب المشروع
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. إعداد بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. تثبيت أدوات التمويه والرصد
        run: pip install requests beautifulsoup4 lxml

      - name: 4. تشغيل الرادار السيادي
        run: python scripts/banned_news.py

      - name: 5. المزامنة القسرية وحل تعارضات الـ 15 خطأ
        run: |
          git config --local user.email "radar-bot@bannednews.com"
          git config --local user.name "Radar-Engine-Bot"
          
          git add data/banned_news_feed.json
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "رصد ميداني: أرشفة الأخبار المحظورة [Geo-Sync]"
            # فرض الدمج وتجاوز أي أخطاء سابقة في السجل
            git pull --rebase --autostash -X theirs origin main
            git push origin main || git push origin main --force
          else
            echo "لا توجد تحديثات جديدة حالياً."
          fi

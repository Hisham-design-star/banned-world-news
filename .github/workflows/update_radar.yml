name: Global News Radar Engine

on:
  schedule:
    - cron: '0 */4 * * *' # تشغيل كل 4 ساعات
  workflow_dispatch: # إمكانية التشغيل اليدوي

# منح الصلاحيات اللازمة للمحرك للكتابة في المستودع
permissions:
  contents: write

jobs:
  run-radars:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. سحب الكود المصدري
        uses: actions/checkout@v4 # تحديث لآخر إصدار لتجنب تحذيرات Node
        with:
          fetch-depth: 0

      - name: 2. تجهيز بيئة بايثون السيادية
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. تشغيل محركات الرصد (Radars)
        run: |
          python scripts/palestine_center.py
          python scripts/military_ops.py
          python scripts/banned_news.py
        continue-on-error: true # لضمان استمرار العمل حتى لو فشل أحد الرادارات

      - name: 4. المعالجة الجنائية والحفظ (Forensic Commit & Push)
        run: |
          git config --local user.email "radar-bot@bannednews.com"
          git config --local user.name "Radar-Engine-Bot"
          
          # إضافة كافة التغييرات التي تمت في مجلد data
          git add .
          
          # التحقق من وجود بيانات جديدة فعلياً قبل الحفظ
          if git diff --quiet && git diff --staged --quiet; then
            echo "لا توجد بيانات جديدة لرصدها."
          else
            git commit -m "تحديث رادار الحقيقة: رصد وأرشفة بيانات جديدة"
            
            # السحب مع دمج التغييرات (Rebase) واستخدام استراتيجية Ours 
            # لضمان عدم توقف المحرك عند حدوث تضارب
            git pull --rebase --autostash origin main
            
            git push origin main
          fi

name: Ultimate News Radar Sync

on:
  schedule:
    - cron: '0 */3 * * *' # تشغيل كل 3 ساعات لمواكبة الميدان
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: 1. جلب الكود
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. إعداد بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. تثبيت المكتبات
        run: pip install requests beautifulsoup4 lxml

      - name: 4. تشغيل الرادار المطور
        run: python scripts/banned_news.py

      - name: 5. مزامنة البيانات وحل التعارضات قسرياً
        run: |
          git config --local user.email "radar-bot@bannednews.com"
          git config --local user.name "Radar-Engine-Bot"
          
          git add data/banned_news_feed.json
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "رصد جغرافي وتوثيق جديد [Automated]"
            # التقنية السحرية لمنع الـ 15 خطأ:
            git pull --rebase --autostash -X theirs origin main
            git push origin main || git push origin main --force
          else
            echo "لا توجد أخبار محظورة جديدة حالياً."
          fi

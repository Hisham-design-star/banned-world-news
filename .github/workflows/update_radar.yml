name: Global News Radar Engine

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-radars:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. سحب الكود المصدري
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. تجهيز بيئة بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. تشغيل محركات الرصد
        run: |
          python scripts/palestine_center.py
          python scripts/military_ops.py
          python scripts/banned_news.py
        continue-on-error: true

      - name: 4. الحفظ والرفع الآمن للبيانات
        run: |
          git config --local user.email "radar-bot@bannednews.com"
          git config --local user.name "Radar-Engine-Bot"
          
          # الحفاظ على التغييرات الجديدة مؤقتاً
          git add .
          
          # التحقق من وجود تغييرات حقيقية
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "تحديث رادار الحقيقة: أرشفة بيانات جديدة"
            
            # الحل الجذري: جلب التحديثات ودمجها مع تفضيل الملفات المحلية الجديدة
            git fetch origin main
            git rebase -X theirs origin/main
            
            # الرفع النهائي
            git push origin main
          else
            echo "لا توجد بيانات جديدة لرصدها."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

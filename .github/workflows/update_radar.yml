name: Global News Radar Engine

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-radars:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. سحب الكود (نسخة كاملة)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. بيئة بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. تشغيل الرادارات
        run: |
          python scripts/palestine_center.py
          python scripts/military_ops.py
          python scripts/banned_news.py
        continue-on-error: true

      - name: 4. فرض حفظ البيانات (الحل الجذري)
        run: |
          git config --local user.email "radar-bot@bannednews.com"
          git config --local user.name "Radar-Engine-Bot"
          
          # إضافة كل البيانات الجديدة
          git add .
          
          # التحقق من وجود تغييرات
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "تحديث سيادي: أرشفة الأخبار المرصودة"
            
            # الحل السحري: سحب التحديثات مع إخفاء التغييرات المحلية مؤقتاً (Stash) 
            # ثم إعادة دمجها فوق التحديثات القادمة من الخادم
            git pull --rebase --autostash origin main
            
            # الرفع النهائي
            git push origin main
          else
            echo "لم يتم رصد أي أخبار جديدة في هذه الدورة."
          fi

name: Global News Radar Engine

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  run-radars: # هنا يجب أن تكون هناك مسافتان في بداية السطر
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. سحب ملفات المشروع
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 2. تجهيز بيئة بايثون
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Palestine Center Radar
        run: python scripts/palestine_center.py
        continue-on-error: true

      - name: Run Military Ops Radar
        run: python scripts/military_ops.py
        continue-on-error: true

      - name: Run Banned News Radar
        run: python scripts/banned_news.py
        continue-on-error: true

      - name: Commit and Push New Data
        run: |
          git config --local user.email "radar-bot@bannednews.com"
          git config --local user.name "Radar Bot"
          
          # 1. إضافة كافة التغييرات والملفات الجديدة
          git add .
          
          # 2. التحقق من وجود تغييرات فعلية لتجنب خطأ الحفظ الفارغ
          if ! git diff --staged --quiet; then
            # 3. حفظ التغييرات محلياً أولاً
            git commit -m "تحديث تلقائي: رصد بيانات أخبار جديدة"
            # 4. سحب أي تحديثات من المستودع بمرونة
            git pull --rebase origin main
            # 5. رفع البيانات النهائية إلى المستودع
            git push
          else
            echo "لا توجد بيانات أو أخبار جديدة لرفعها في هذا التشغيل."
          fi

